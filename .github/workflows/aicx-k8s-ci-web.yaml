name: K8S Deploy - AICX Callbot Web CI/CD
run-name: Deploy WEB to ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        description: '배포 환경 선택'
        default: dev
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ${{ secrets.ECR_REGISTRY }}/${{ inputs.environment }}-aicx-callbot-web
  APP_NAME: aicx-callbot/web

jobs:
  generate-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.generate_tag.outputs.tag }}
    steps:
      - name: Generate deployment metadata
        id: generate_tag
        run: |
          TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"

  build-and-deploy:
    needs: [generate-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: AWS Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          audience: sts.amazonaws.com
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.ECR_ROLE }}

      - name: ECR Login
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve BACKEND_URL by environment
        id: backend_url
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "url=https://callbot.aicx.kr" >> $GITHUB_OUTPUT
          else
            echo "url=https://callbot.dev-aicx.kr" >> $GITHUB_OUTPUT
          fi

      - name: Docker build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.ECR_REPOSITORY }}:${{ needs.generate-tag.outputs.tag }}
          build-args: |
            BACKEND_URL=${{ steps.backend_url.outputs.url }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Update manifest repository
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MANIFEST_REPO_PAT }}
          repository: aicx-kr/aicx-k8s-manifests
          event-type: update-image-tag
          client-payload: |
            {
              "env": "${{ inputs.environment }}",
              "app_name": "${{ env.APP_NAME }}",
              "new_tag": "${{ needs.generate-tag.outputs.tag }}"
            }

      - name: Deployment summary
        if: success()
        run: |
          echo "Web deployment successful!"
          echo "Tag: ${{ needs.generate-tag.outputs.tag }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Image: ${{ env.ECR_REPOSITORY }}:${{ needs.generate-tag.outputs.tag }}"
          echo "Manifest: ${{ env.APP_NAME }}"
